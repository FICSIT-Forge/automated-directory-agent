# Deploy from main (issue #8): functions + hosting + firestore rules/indexes
# in one `firebase deploy`, authenticated via Direct Workload Identity
# Federation — no long-lived keys. The WIF pool/provider and IAM grants are
# provisioned outside this file (see scripts/provisionFirestore.sh header for
# the pattern); the provider is scoped to this repository only.
name: Deploy

on:
  # Manual escape hatch: redeploy current main (e.g. after changing this
  # workflow, or when a skipped docs-only merge should ship anyway).
  workflow_dispatch:
  push:
    branches: [main]
    # Skip deploys for merges that can't change what's deployed. Safe because
    # each deploy ships the full state of main HEAD — a skipped run never
    # causes drift; the next qualifying merge catches everything up.
    paths-ignore:
      - "**.md"
      - ".claude/**"
      - ".github/**"

# Queue deploys instead of cancelling: a half-cancelled firebase deploy can
# leave functions and hosting on different revisions.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            functions/pnpm-lock.yaml
            web/pnpm-lock.yaml
      # firebase.json's functions predeploy (format → lint → build) runs pnpm
      # inside functions/, so deps must be installed before `firebase deploy`.
      - name: Install functions dependencies
        working-directory: functions
        run: pnpm install --frozen-lockfile
      - name: Build web (Nuxt SSG)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      # WIF with service-account impersonation, NOT direct WIF: firebase-tools
      # crashes on direct external_account credentials (its ADC token cache
      # reads tokens that are never populated — "Cannot read properties of
      # undefined (reading 'access_token')", seen on 15.22.1 and 15.22.4).
      # Impersonation mints short-lived tokens with a client_email, the shape
      # firebase-tools handles. Still keyless: no exported SA keys.
      - uses: google-github-actions/auth@v3
        with:
          project_id: ficsit-forge
          workload_identity_provider: projects/475186372635/locations/global/workloadIdentityPools/github/providers/adagent-repo
          service_account: github-deployer@ficsit-forge.iam.gserviceaccount.com
      # Pinned to 15.22.1: 15.22.2+ has a WIF/ADC auth regression
      # (firebase/firebase-tools#10716). Unpin once the fix ships and a WIF
      # deploy succeeds.
      - name: Deploy functions + hosting + firestore
        run: >
          pnpm dlx firebase-tools@15.22.1 deploy
          --only functions,hosting:adagent,firestore
          --project ficsit-forge --non-interactive --force
      # firebase-tools prints only "An unexpected error has occurred." for
      # uncaught exceptions; the stack goes to firebase-debug.log.
      - name: Dump firebase-debug.log on failure
        if: failure()
        run: tail -n 200 firebase-debug.log || echo "no firebase-debug.log — the CLI failed cleanly (error is in the deploy step output above)"
